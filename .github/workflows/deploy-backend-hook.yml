name: Deploy backend with deploy hook

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-hook.yml'
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.BACKEND_DEPLOY_HOOK_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deployment
        run: curl --fail --show-error --silent --request POST "$BACKEND_DEPLOY_HOOK_URL"
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
