name: Deploy backend with deploy hook

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-hook.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
    steps:
      - name: Skip when deploy hook is not configured
        if: ${{ env.BACKEND_DEPLOY_HOOK_URL == '' }}
        run: echo "BACKEND_DEPLOY_HOOK_URL is not configured; skipping backend deployment."

      - name: Trigger backend deployment
        if: ${{ env.BACKEND_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --show-error --silent --request POST "$BACKEND_DEPLOY_HOOK_URL"
